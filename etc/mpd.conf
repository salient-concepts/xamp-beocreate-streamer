music_directory		"/var/lib/mpd/music"
playlist_directory	"/var/lib/mpd/playlists"
state_file		"/var/lib/mpd/state"
user			"mpd"
bind_to_address		"0.0.0.0"
port			"6600"

audio_output {
	type		"alsa"
	name		"HiFiBerry"
	device		"hw:0,0"
	mixer_type	"software"
	# Beocreate DSP profile is compiled for 48 kHz. Force MPD to always emit
	# 48 kHz / 24-bit / stereo so the DSP PLL never has to hunt for a new
	# I2S clock — eliminates cold-boot pops/crackle that came from feeding
	# the DSP 44.1 kHz streams (e.g. Radio Paradise FLAC) into a 48 kHz program.
	format		"48000:24:2"
}

audio_output {
	type		"fifo"
	name		"Visualizer"
	path		"/tmp/mpd.fifo"
}

zeroconf_enabled	"yes"
zeroconf_name		"xAMP Beocreate"

audio_buffer_size "16384"

# High-quality resampler for 44.1 → 48 kHz conversion (Radio Paradise FLAC,
# most internet radio). SoX is libsoxr — well-regarded transparent resampler.
samplerate_converter "soxr very high"
