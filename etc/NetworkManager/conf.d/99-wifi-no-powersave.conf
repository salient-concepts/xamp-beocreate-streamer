# Disable WiFi power-save for the wlan0 interface.
#
# WiFi power-save defaults to ON on Pi OS Trixie (visible in dmesg as
#   brcmfmac: brcmf_cfg80211_set_power_mgmt: power save enabled
# ). The brcmfmac radio sleeps between packets, which queues incoming
# stream data and produces intermittent audio dropouts when the streamer
# runs WiFi-only. Force NetworkManager to leave the radio awake on every
# connection.
#
# Values: 0=default, 1=ignore (don't touch), 2=disable, 3=enable
[connection]
wifi.powersave = 2
