// xAMP Beocreate — AirPlay 2 receiver config
general = {
    name = "xAMP Beocreate";
    output_backend = "alsa";
    mdns_backend = "avahi";
    volume_max_db = 0;
};

alsa = {
    output_device = "hw:sndrpihifiberry,0";
};

sessioncontrol = {
    allow_session_interruption = "yes";
    // Seamless switch MPD → AirPlay: the hook script POSTs `state=start` to
    // the webapp (so MPD auto-resume backs off), then runs `mpc stop` to
    // release ALSA. The end-of-session hook clears the AirPlay flag on the
    // webapp side so MPD auto-resume can take over again if needed.
    // Reverse direction (AirPlay → MPD) is handled by the webapp restarting
    // shairport-sync before issuing MPD play commands.
    run_this_before_play_begins = "/usr/local/sbin/xamp-airplay-event start";
    run_this_after_play_ends    = "/usr/local/sbin/xamp-airplay-event stop";
};

diagnostics = {
    log_verbosity = 2;
    statistics = "no";
};
